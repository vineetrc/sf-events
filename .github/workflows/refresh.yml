name: Refresh Bay Area Events

on:
  schedule:
    - cron: '0 14 * * *'  # 6 AM PT (14:00 UTC)
  workflow_dispatch:       # Allow manual trigger

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run events scraper
        run: node scraper.js
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}

      - name: Commit and push updated events
        run: |
          git config user.name "SF Events Bot"
          git config user.email "bot@sfevents.app"
          git add public/events.json
          git diff --staged --quiet || git commit -m "chore: refresh events $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
